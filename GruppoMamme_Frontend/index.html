<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="index.js"></script>
</head>
<body onload="init()">

    <div class="dashboard-container">
        
        <header class="dashboard-header">
            <div class="dashboard-title">
                <h1>Progetto Sirius</h1>
                <p>Monitoraggio Telemetria Turbina e Velocità Vento</p>
            </div>
            <form onsubmit="return false;">
                <input type="button" class="btn-refresh" value="Aggiorna Dati" onclick="caricaDatiSirius()">
            </form>
        </header>

        <main class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </main>
        
    </div>
    
</body>
</html>
